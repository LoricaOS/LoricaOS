name: build

# Builds the LoricaOS images for both architectures and both profiles:
#   x86-64 : desktop.iso + server.iso   (fetches published components/kernel)
#   arm64  : desktop.ext2 + server.ext2 + RPi5 native kernel .img (source build)
# A cheap `parity` gate first enforces that the arm64 desktop bakes exactly the
# same component set as x86 (tools/components.list).
#
# NOTE: the arm64 job is a source build with many prerequisites (aarch64 cross
# toolchain + musl sysroot + ~20 component repos). It is expected to need a
# couple of push iterations to go green — the fragile steps are commented.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # ── 1:1 parity gate (fast, deterministic) ──────────────────────────────
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: arm64 desktop == x86 components.list
        run: bash tools/check-desktop-parity.sh

  # ── x86-64: desktop + server ISOs ──────────────────────────────────────
  x86:
    runs-on: ubuntu-latest
    needs: parity
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential musl musl-tools nasm \
            xorriso e2fsprogs mtools git curl wget pkg-config
      - name: Build musl + FFmpeg static libs
        # A base user binary (ffsmoke) and lumen-video link the trimmed FFmpeg
        # decode libs, built with the in-tree musl-gcc. Do it before the ISO
        # build so the user-progs step finds build/ffmpeg-install/. (On a warm
        # dev box these are cached; a fresh CI runner must build them.)
        run: |
          bash tools/build-musl.sh
          CC="$PWD/build/musl-dynamic/usr/bin/musl-gcc" bash tools/build-ffmpeg.sh
      - name: Build desktop + server ISOs
        # `make` fetches the kernel (tools/fetch-kernel.sh), components
        # (tools/fetch-components.sh) and Limine (tools/fetch-limine.sh).
        run: make desktop-iso server-iso
      - uses: actions/upload-artifact@v4
        with:
          name: loricaos-x86
          path: |
            build/loricaos-desktop.iso
            build/loricaos-server.iso
          if-no-files-found: error

  # ── arm64: desktop + server rootfs + RPi5 native kernel image ──────────
  arm64:
    runs-on: ubuntu-latest
    needs: parity
    steps:
      - uses: actions/checkout@v4          # loricaos itself
      # build-arm64-*.sh hardcode /root/<repo>; we check out to a temp dir and
      # symlink /root/<repo> at each one. SRC is set here (not job-level env)
      # because the `runner` context is not available in job-level `env` — using
      # it there fails the whole workflow at parse time (0s, no logs).
      - name: Set source dir
        run: echo "SRC=${{ runner.temp }}/src" >> "$GITHUB_ENV"
      - name: Install aarch64 cross toolchain + image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            build-essential nasm xorriso e2fsprogs git curl
      - name: Fetch kernel + component repos
        # Public repos under github.com/LoricaOS/. If any move org / need auth,
        # switch to actions/checkout with a token here.
        run: |
          mkdir -p "$SRC"
          repos="aegis glyph coreutils lumen bastion citadel-dock lumen-shell \
                 lumen-applications-menu lumen-dbg lumen-settings lumen-terminal \
                 lumen-calculator lumen-editor lumen-filemanager lumen-run \
                 lumen-tunes lumen-calendar lumen-imageviewer lumen-sysmon \
                 lumen-netman lumen-video"
          for r in $repos; do
            git clone --depth 1 "https://github.com/LoricaOS/$r.git" "$SRC/$r" \
              || { echo "::error::clone failed for $r"; exit 1; }
            sudo ln -sfn "$SRC/$r" "/root/$r"
          done
          sudo ln -sfn "$GITHUB_WORKSPACE" /root/loricaos
      - name: Build arm64 server + desktop rootfs
        # build-arm64-server.sh builds the musl sysroot + base userland;
        # build-arm64-desktop.sh overlays the (source-compiled) GUI stack.
        run: |
          sudo -E bash tools/build-arm64-server.sh
          sudo -E bash tools/build-arm64-desktop.sh
      - name: Build RPi5 native kernel image
        # The bootable RPi5 image is the aegis pi5-native kernel + the desktop
        # rootfs.ext2 (loaded as the initramfs by the Pi firmware).
        run: |
          make -C /root/aegis -f Makefile.pi5native kernel
      - uses: actions/upload-artifact@v4
        with:
          name: loricaos-arm64
          path: |
            build/arm64-desktop/rootfs.ext2
            build/arm64-server/rootfs.ext2
            ${{ env.SRC }}/aegis/build/pi5native/pi5-kernel.img
          if-no-files-found: error
